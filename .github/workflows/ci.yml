name: Workflow CI - Retrain & Build Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  retrain-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install MLflow & dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas==2.2.3 numpy==1.26.4 scikit-learn==1.5.2 matplotlib==3.9.2

      - name: Run MLflow Project (retraining)
        run: |
          mlflow run ./MLProject --env-manager=local --experiment-name house-price-ci \
            -P data_dir=$(pwd)/namadataset_preprocessing \
            -P n_estimators=300 \
            -P max_depth=None \
            -P min_samples_split=2 \
            -P min_samples_leaf=1 | tee mlflow_run.log

      - name: Get latest run id
        id: get_run_id
        run: |
          RUN_ID=$(grep -oE 'MLFLOW_RUN_ID=[a-f0-9]+' mlflow_run.log | tail -1 | cut -d= -f2)
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Latest run id: $RUN_ID"

      - name: Upload MLflow artifacts (mlruns) as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-${{ github.run_id }}
          path: mlruns/

      - name: Commit & push training artifacts to repository
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions[bot]"
          git add mlruns
          git diff --staged --quiet || git commit -m "ci: save retrained model artifacts [skip ci]"
          git push

      - name: Build Docker image from MLflow model
        run: |
          mlflow models build-docker \
            -m "runs:/${{ steps.get_run_id.outputs.run_id }}/model" \
            -n "${{ secrets.DOCKERHUB_USERNAME }}/house-price-model:latest"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/house-price-model:latest"
